<!DOCTYPE html> 
<html lang="es">       
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <!-- FAVICON -->
  <link rel="icon" type="image/png" sizes="32x32" href="./favicon.png?v=31">
  <link rel="shortcut icon" type="image/png" href="./favicon.png?v=31">  
  <link rel="apple-touch-icon" href="./favicon.png?v=31">

  <title>Odontología Pamela | Consultorio Dental en Quevedo</title>

  <meta name="description" content="Odontología Pamela, consultorio odontológico en Quevedo. Atención dental profesional, estética dental, limpieza, ortodoncia, rehabilitación oral e implantes con cita previa.">

  <meta name="keywords" content="odontología en Quevedo, dentista en Quevedo, clínica dental Quevedo, estética dental, limpieza dental, ortodoncia, implantes dentales, odontología familiar">

  <meta name="author" content="Odontología Pamela">

  <style>

    :root {
      --azul:#0077b6;
      --azul-claro:#00b4d8;
      --azul-oscuro:#023e8a;
      --turquesa-suave:#e9fbff;
      --borde-azul:#bdeef7;
      --texto:#333333;
      --whatsapp:#25D366;
      --whatsapp-oscuro:#128C7E;
    }

    *{
      box-sizing:border-box;
    }

    body{
      font-family:Arial,sans-serif;
      margin:0;
      background:#ffffff;
      color:var(--texto);
      line-height:1.6;
    }

    .top-logo{
      text-align:center;
      padding:6px 15px 0;
      background:#ffffff;
    }

    .top-logo img{
      max-width:380px;
      width:86%;
      height:auto;
    }

    nav{
      background:linear-gradient(90deg,var(--azul-oscuro),var(--azul),var(--azul-claro));
      text-align:center;
      padding:12px 5px;
      position:sticky;
      top:0;
      z-index:100;
    }

    nav a{
      color:#fff;
      text-decoration:none;
      margin:0 12px;
      font-weight:bold;
      padding:8px 14px;
      border-radius:22px;
      display:inline-block;
      transition:all .25s ease;
      font-size:.95rem;
    }

    nav a:hover{
      background:rgba(255,255,255,.22);
      transform:translateY(-1px);
    }

    .social-bar{
      background:#f2fcff;
      padding:18px 10px;
      display:flex;
      justify-content:center;
      align-items:center;
      gap:28px;
      flex-wrap:wrap;
      border-bottom:1px solid var(--borde-azul);
    }

    .social-bar a{
      width:90px;
      height:90px;
      border-radius:50%;
      background:#ffffff;
      display:flex;
      justify-content:center;
      align-items:center;
      border:2px solid #d9f4fb;
      box-shadow:0 6px 18px rgba(0,119,182,.12);
      transition:all .25s ease;
    }

    .social-bar a:hover{
      transform:translateY(-4px) scale(1.05);
      box-shadow:0 10px 24px rgba(0,119,182,.18);
    }

    .social-bar img{
      width:58px;
      height:58px;
      object-fit:contain;
    }

  </style>
</head>

<body>

<header id="inicio" class="top-logo">

  <!-- LOGOTIPO PRINCIPAL -->
  <img src="logotipo.png" alt="Logotipo de Odontología Pamela">

</header>

<nav>
  <a href="#inicio">INICIO</a>
  <a href="#nosotros">NOSOTROS</a>
  <a href="#servicios">SERVICIOS</a>
  <a href="#confianza">CONFIANZA</a>
  <a href="#contacto">CONTACTO</a>
</nav>

<div class="social-bar">

  <a href="#" aria-label="Ubicación">
    <img src="ubicacion.png" alt="Ubicación">
  </a>

  <a href="#" aria-label="Instagram">
    <img src="instagram.png" alt="Instagram">
  </a>

  <a href="#" aria-label="Facebook">
    <img src="facebook.png" alt="Facebook">
  </a>

  <a href="#" aria-label="TikTok">
    <img src="tiktok.png" alt="TikTok">
  </a>

</div>

</body>
</html>
